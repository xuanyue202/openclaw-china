name: Update NPM Downloads Badge

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate badge data
        run: node scripts/update-npm-download-badge.mjs

      - name: Commit badge updates
        run: |
          if git diff --quiet -- .github/badges/npm-downloads-18m.json .github/badges/npm-downloads-18m.svg .github/badges/npm-downloads-18m-summary.json; then
            echo "Badge data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/npm-downloads-18m.json .github/badges/npm-downloads-18m.svg .github/badges/npm-downloads-18m-summary.json
          git commit -m "chore: update npm downloads badge"
          git push
